name: tests

on:
  push:
    branches: ['*']
  pull_request:
    branches: ['*']

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Start database
        run: |
          docker-compose up -d
          sleep 10

      - name: Run tests
        run: docker-compose exec -T pg ./run_tests.sh
